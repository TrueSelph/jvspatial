name: Security audit

# Runs pip-audit weekly and on any change to dependency declarations.
# Currently non-blocking (continue-on-error: true) so an upstream CVE
# disclosure doesn't block unrelated PRs while a maintainer triages.
# Flip to ``false`` once the dependency hygiene baseline is clean.

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/security.yml'
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'requirements*.txt'
  schedule:
    # Mondays at 06:00 UTC. Catches CVEs disclosed over the weekend
    # before adopters hit them.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          # Install jvspatial *editable* so pip-audit's --skip-editable
          # actually excludes it from the PyPI resolution. Without -e
          # here pip-audit treats jvspatial as a regular wheel and
          # fails with "Dependency not found on PyPI: jvspatial
          # (0.0.x)" -- the in-development version isn't published.
          pip install -e '.[dev,test,otel]'

      - name: Run pip-audit
        run: |
          # --skip-editable: skip jvspatial itself (installed editable
          #   above) -- its in-development version isn't on PyPI yet.
          # --strict: fail on any vulnerability in the resolved deps.
          # The whole job is wrapped in continue-on-error today so a
          # CVE in a transitive dep doesn't block unrelated PRs while
          # a maintainer triages.
          pip-audit --strict --skip-editable --progress-spinner off
