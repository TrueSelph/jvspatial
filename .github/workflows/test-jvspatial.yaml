name: Test jvspatial

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - name: Check out code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Install jvspatial package with test and lambda dependencies
      run: pip install -e '.[test,lambda]'

    - name: Run tests
      # Phased raise: was 50; next step is 60+ once gaps are closed
      run: pytest tests/ -v --tb=short --cov=jvspatial --cov-report=xml --cov-report=term-missing --cov-fail-under=55
    # Pre-commit runs once in .github/workflows/pre-commit.yaml (same triggers); omit here to avoid 3× duplicate work.