services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jvspatial-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: jvspatial
      POSTGRES_PASSWORD: jvspatial
      POSTGRES_DB: jvspatial
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jvspatial -d jvspatial"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=500"

volumes:
  pgdata:
    name: jvspatial-pgdata
